# .wt.conf — VASCO60 worktree configuration
# Used by the wt command (sitrec-tools/wt.sh + _wt).

PROJECT_NAME="vasco60"
GITHUB_REPO="MickWest/vasco60"

# Large data directories — shared across worktrees via symlink
# data/  = 34 GB (tiles, local-cats, metadata)
# .cache/ = 954 MB (fontconfig, matplotlib, cutouts)
SYMLINK_DIRS=("data" ".cache")

# Gitignored config files to copy (contains external drive paths)
COPY_FILES=(".env")

# Python venv setup (created fresh per worktree — venvs have hardcoded paths)
POST_CREATE_CMD='python3 -m venv .venv && .venv/bin/pip install -r requirements.txt'

# Docker sandbox (Python + SExtractor + PSFEx + STILTS)
SANDBOX_DIR="sandbox"
