# PSFEx config tuned to match the Solano 2022 pipeline's SPREAD_MODEL calibration.
# The critical change is PSF_SAMPLING=0.5 (vs 0.0 auto) which shifts the PSF
# reconstruction to finer sub-pixel sampling appropriate for POSS-I's undersampled PSF
BASIS_TYPE          PIXEL_AUTO
BASIS_NUMBER        20
PSF_SAMPLING        0.5
PSF_ACCURACY        0.01
PSF_SIZE            25,25
CENTER_KEYS         X_IMAGE,Y_IMAGE
PHOTFLUX_KEY        FLUX_APER(1)
PHOTFLUXERR_KEY     FLUXERR_APER(1)
PSFVAR_KEYS         X_IMAGE,Y_IMAGE
PSFVAR_GROUPS       1,1
PSFVAR_DEGREES      2
SAMPLE_AUTOSELECT Y
SAMPLE_FWHMRANGE 2.0,10.0
SAMPLE_MINSN 20
SAMPLE_MAXELLIP 0.3
CHECKPLOT_DEV       NULL
CHECKIMAGE_TYPE     NONE
PSF_DIR             .
PSF_SUFFIX          .psf
VERBOSE_TYPE        NORMAL
WRITE_XML           N
NTHREADS 1
